name: Tauri Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Create draft release first
  create-release:
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Create Draft Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.GITHUB_REF_NAME,
              name: `Spinning Wheel ${process.env.GITHUB_REF_NAME}`,
              draft: true,
              prerelease: false
            });
            return data.id;

  # Build for Windows
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri
        run: npm run tauri build -- --bundles msi,nsis

      - name: Upload MSI
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = '${{ needs.create-release.outputs.release_id }}';
            const msiPath = path.join('src-tauri', 'target', 'release', 'bundle', 'msi');
            const files = fs.readdirSync(msiPath).filter(f => f.endsWith('.msi'));
            for (const file of files) {
              const uploadPath = path.join(msiPath, file);
              const data = fs.readFileSync(uploadPath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: parseInt(releaseId),
                name: file,
                data: data
              });
            }

      - name: Upload NSIS
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = '${{ needs.create-release.outputs.release_id }}';
            const nsisPath = path.join('src-tauri', 'target', 'release', 'bundle', 'nsis');
            const files = fs.readdirSync(nsisPath).filter(f => f.endsWith('.exe'));
            for (const file of files) {
              const uploadPath = path.join(nsisPath, file);
              const data = fs.readFileSync(uploadPath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: parseInt(releaseId),
                name: file,
                data: data
              });
            }

  # Build for macOS Intel
  build-macos-intel:
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri
        run: npm run tauri build -- --bundles dmg

      - name: Upload DMG
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = '${{ needs.create-release.outputs.release_id }}';
            const dmgPath = path.join('src-tauri', 'target', 'release', 'bundle', 'dmg');
            const files = fs.readdirSync(dmgPath).filter(f => f.endsWith('.dmg'));
            for (const file of files) {
              const uploadPath = path.join(dmgPath, file);
              const data = fs.readFileSync(uploadPath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: parseInt(releaseId),
                name: file,
                data: data
              });
            }

  # Build for macOS Apple Silicon
  build-macos-aarch64:
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (Apple Silicon)
        run: npm run tauri build -- --bundles dmg --target aarch64-apple-darwin

      - name: Upload DMG (Apple Silicon)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = '${{ needs.create-release.outputs.release_id }}';
            const dmgPath = path.join('src-tauri', 'target', 'aarch64-apple-darwin', 'release', 'bundle', 'dmg');
            if (!fs.existsSync(dmgPath)) {
              console.log('No DMG files found for aarch64');
              return;
            }
            const files = fs.readdirSync(dmgPath).filter(f => f.endsWith('.dmg'));
            for (const file of files) {
              const uploadPath = path.join(dmgPath, file);
              const data = fs.readFileSync(uploadPath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: parseInt(releaseId),
                name: `aarch64-${file}`,
                data: data
              });
            }

  # Build for Linux
  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri
        run: npm run tauri build -- --bundles deb,appimage,rpm

      - name: Upload DEB
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = '${{ needs.create-release.outputs.release_id }}';
            const debPath = path.join('src-tauri', 'target', 'release', 'bundle', 'deb');
            if (!fs.existsSync(debPath)) {
              console.log('No DEB files found');
              return;
            }
            const files = fs.readdirSync(debPath).filter(f => f.endsWith('.deb'));
            for (const file of files) {
              const uploadPath = path.join(debPath, file);
              const data = fs.readFileSync(uploadPath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: parseInt(releaseId),
                name: file,
                data: data
              });
            }

      - name: Upload AppImage
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = '${{ needs.create-release.outputs.release_id }}';
            const appImagePath = path.join('src-tauri', 'target', 'release', 'bundle', 'appimage');
            if (!fs.existsSync(appImagePath)) {
              console.log('No AppImage files found');
              return;
            }
            const files = fs.readdirSync(appImagePath).filter(f => f.endsWith('.AppImage'));
            for (const file of files) {
              const uploadPath = path.join(appImagePath, file);
              const data = fs.readFileSync(uploadPath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: parseInt(releaseId),
                name: file,
                data: data
              });
            }

      - name: Upload RPM
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = '${{ needs.create-release.outputs.release_id }}';
            const rpmPath = path.join('src-tauri', 'target', 'release', 'bundle', 'rpm');
            if (!fs.existsSync(rpmPath)) {
              console.log('No RPM files found');
              return;
            }
            const files = fs.readdirSync(rpmPath).filter(f => f.endsWith('.rpm'));
            for (const file of files) {
              const uploadPath = path.join(rpmPath, file);
              const data = fs.readFileSync(uploadPath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: parseInt(releaseId),
                name: file,
                data: data
              });
            }
